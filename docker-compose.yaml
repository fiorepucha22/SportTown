# SOLO DESARROLLO LOCAL — no usar en producción (VPS usa Nginx + PHP-FPM + MySQL nativos).
# Uso: docker compose up --build

services:
  db:
    image: mariadb:10.4
    environment:
      MYSQL_ROOT_PASSWORD: fiore
      MYSQL_DATABASE: instalacionesdep
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pfiore"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: instalacionesdep
      DB_USERNAME: root
      DB_PASSWORD: fiore

  frontend:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db_data:
